{% extends "base.html" %}
{% block title %}500 — Ошибка сервера | StudyTracker{% endblock %}
{% block content %}
<section class="text-center py-5">
    <div class="error-code">500</div>
    <h1 class="h2 fw-bold mt-2">Внутренняя ошибка сервера</h1>
    <p class="text-muted mb-4">
        Что-то пошло не так на стороне сервера. Мы уже в курсе! Попробуй обновить страницу через минуту.
    </p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary px-4">
        <i class="bi bi-house me-2"></i>На дашборд
    </a>
</section>
{% endblock %}
